name: emeu

services:
  loki:
    image: grafana/loki:${LOKI_VERSION:-3.5.0}
    container_name: emeu_loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yml"]
    ports:
      - "${LOKI_BIND:-127.0.0.1}:${LOKI_PORT:-3100}:3100"
    volumes:
      - ./docker/observabilidade/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    networks:
      - emeu_net

  promtail:
    image: grafana/promtail:${PROMTAIL_VERSION:-3.5.0}
    container_name: emeu_promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      - loki
    volumes:
      - ./docker/observabilidade/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - emeu_net

volumes:
  loki_data:
