name: emeu

services:
  caddy:
    image: caddy:${CADDY_VERSION:-2.10.0}
    container_name: emeu_caddy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - n8n
      - evolution-api
      - evolution-manager
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?configure ACME_EMAIL para staging}
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN:?configure FRONTEND_DOMAIN para staging}
      API_DOMAIN: ${API_DOMAIN:?configure API_DOMAIN para staging}
      N8N_DOMAIN: ${N8N_DOMAIN:?configure N8N_DOMAIN para staging}
      EVOLUTION_DOMAIN: ${EVOLUTION_DOMAIN:?configure EVOLUTION_DOMAIN para staging}
      EVOLUTION_MANAGER_DOMAIN: ${EVOLUTION_MANAGER_DOMAIN:?configure EVOLUTION_MANAGER_DOMAIN para staging}
    ports:
      - "${HTTP_BIND:-0.0.0.0}:80:80"
      - "${HTTPS_BIND:-0.0.0.0}:443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - emeu_net

volumes:
  caddy_data:
  caddy_config:
